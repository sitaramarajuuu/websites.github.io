<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Run!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f7f7f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-wrapper {
    position: relative;
    width: 800px;
    max-width: 95vw;
  }

  #score-board {
    display: flex;
    justify-content: flex-end;
    gap: 24px;
    padding: 8px 4px;
    font-size: 13px;
    color: #535353;
    letter-spacing: 1px;
  }

  #score-board span { opacity: 0.8; }
  #score-board .val { opacity: 1; font-weight: bold; }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-bottom: 2px solid #535353;
  }

  #msg {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #535353;
    pointer-events: none;
    line-height: 2.4;
  }
  #msg .title { font-size: 22px; }
  #msg .sub   { font-size: 10px; opacity: .7; }

  #mobile-controls {
    display: none;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
  }
  #mobile-controls button {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 14px 28px;
    border: 2px solid #535353;
    background: #fff;
    color: #535353;
    border-radius: 6px;
    cursor: pointer;
    active { background: #535353; color: #fff; }
  }

  @media (hover: none) and (pointer: coarse) {
    #mobile-controls { display: flex; }
  }

  .night body { background: #1a1a2e; }
  .night #score-board { color: #c4c4c4; }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="score-board">
    <span>HI <span class="val" id="hi-score">00000</span></span>
    <span class="val" id="cur-score">00000</span>
  </div>
  <canvas id="c" width="800" height="200"></canvas>
  <div id="msg">
    <div class="title">DINO RUN</div>
    <div class="sub">Press SPACE or tap to start</div>
  </div>
  <div id="mobile-controls">
    <button id="btn-jump">↑ JUMP</button>
    <button id="btn-duck">↓ DUCK</button>
  </div>
</div>

<script>
// ─── Canvas Setup ───────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ─── Sprite Data (hand-drawn pixel art via code) ───────────
function createSprite(w, h, drawFn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.fillStyle = '#535353';
  drawFn(x);
  return c;
}

// Dino standing
const dinoW = 44, dinoH = 48;
const dinoSprite = createSprite(dinoW * 2, dinoH, (x) => {
  // Frame 1 - standing
  const d = [
    "....XXXXXXXX",
    "...XXXXXXXXXXX",
    "...XXXXXXXXXXX",
    "...XX.XXXXXXXX",
    "...XXXXXXXXXXXX",
    "...XXXXXXXXXXXX",
    "...XXXXXXX.....",
    "...XXXXXXXXX...",
    "X..XXXXXXXX....",
    "X.XXXXXXXXXXX..",
    "XXXXXXXXXXXXXX.",
    "XXXX.XXXXXXXXX.",
    ".XXX.XXXXXXXX..",
    "..XX.XXXXXXX...",
    "..X..XXXXX.....",
    "..X...XX.XX....",
    ".......X..X....",
    ".......XX..X...",
  ];
  d.forEach((row, ry) => {
    for (let rx = 0; rx < row.length; rx++) {
      if (row[rx] === 'X') x.fillRect(rx * 3, ry * 3 - 6, 3, 3);
    }
  });
  // Frame 2 - right leg up
  const d2 = [...d];
  d2[15] = "..X...XX.......";
  d2[16] = ".......X..X....";
  d2[17] = ".......XX......";
  d2.forEach((row, ry) => {
    for (let rx = 0; rx < row.length; rx++) {
      if (row[rx] === 'X') x.fillRect(rx * 3 + dinoW, ry * 3 - 6, 3, 3);
    }
  });
});

// Dino ducking
const duckW = 60, duckH = 30;
const dinoDuck = createSprite(duckW * 2, duckH, (x) => {
  const d = [
    "..............XXXXXXXX",
    ".............XXXXXXXXXXX",
    ".............XXXXXXXXXXX",
    ".............XX.XXXXXXXX",
    ".............XXXXXXXXXXXX",
    ".............XXXXXXXXXXXX",
    "XX..........XXXXXXX",
    "XXX........XXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXX",
    "XXXXXXXXXXXXXXXXXXXX",
    ".XXXXXXXXXXXXXXXXX",
    "..XXXXXXXXXXXXXXXX",
    "...XXXXXXXXXXXXXX",
    "....XXXX...XXX",
    ".....XX.....XX",
  ];
  d.forEach((row, ry) => {
    for (let rx = 0; rx < row.length; rx++) {
      if (row[rx] === 'X') x.fillRect(rx * 3, ry * 2, 3, 2);
    }
  });
  // Frame 2 - alternate legs
  const d2 = [...d];
  d2[13] = "....XXXX...XXX";
  d2[14] = ".....XX........";
  d2.forEach((row, ry) => {
    for (let rx = 0; rx < row.length; rx++) {
      if (row[rx] === 'X') x.fillRect(rx * 3 + duckW, ry * 2, 3, 2);
    }
  });
});

// Cactus sprites
function makeCactus(type) {
  if (type === 0) { // small single
    return createSprite(17, 36, (x) => {
      x.fillRect(6, 0, 5, 36);
      x.fillRect(0, 8, 6, 5);
      x.fillRect(0, 8, 3, 14);
      x.fillRect(11, 14, 6, 5);
      x.fillRect(14, 14, 3, 12);
    });
  }
  if (type === 1) { // tall single
    return createSprite(17, 50, (x) => {
      x.fillRect(6, 0, 5, 50);
      x.fillRect(0, 12, 6, 5);
      x.fillRect(0, 12, 3, 18);
      x.fillRect(11, 20, 6, 5);
      x.fillRect(14, 20, 3, 16);
    });
  }
  // double
  return createSprite(34, 36, (x) => {
    x.fillRect(6, 0, 5, 36);
    x.fillRect(0, 10, 6, 4);
    x.fillRect(0, 10, 3, 12);
    x.fillRect(11, 16, 6, 4);
    x.fillRect(14, 16, 3, 10);
    x.fillRect(22, 4, 5, 32);
    x.fillRect(16, 14, 6, 4);
    x.fillRect(16, 14, 3, 10);
    x.fillRect(27, 10, 6, 4);
    x.fillRect(30, 10, 3, 14);
  });
}
const cacti = [makeCactus(0), makeCactus(1), makeCactus(2)];

// Pterodactyl
const pteroW = 46, pteroH = 42;
const pteroSprite = createSprite(pteroW * 2, pteroH, (x) => {
  // Wings up
  const body = [[4,18],[5,18],[6,18],[7,18],[8,18],[9,18],[10,18],[11,18],[12,18],[13,18],[14,18],[15,18],
    [3,19],[4,19],[5,19],[6,19],[7,19],[8,19],[9,19],[10,19],[11,19],[12,19],[13,19],[14,19],[15,19],
    [2,20],[3,20],[4,20],[5,20],[6,20],[7,20],[8,20],[9,20],[10,20],[11,20],[12,20],[13,20],[14,20],[15,20],
    [1,21],[2,21],[3,21],[4,21],[5,21],[14,21],[15,21],
    [0,22],[1,22],[2,22],[3,22],[14,22],[15,22],
  ];
  const wingUp = [[8,6],[9,7],[8,7],[10,8],[9,8],[8,8],[11,9],[10,9],[9,9],[8,9],
    [12,10],[11,10],[10,10],[9,10],[8,10],
    [13,11],[12,11],[11,11],[10,11],[9,11],[8,11],
    [13,12],[12,12],[11,12],[10,12],[9,12],[8,12],
    [12,13],[11,13],[10,13],[9,13],[8,13],
    [11,14],[10,14],[9,14],[8,14],
    [10,15],[9,15],[8,15],
    [9,16],[8,16],
    [8,17]];
  [...body, ...wingUp].forEach(([px, py]) => x.fillRect(px * 3, py * 2, 3, 2));

  // Wings down (frame 2)
  const wingDown = [[8,23],[9,24],[8,24],[10,25],[9,25],[8,25],[11,26],[10,26],[9,26],[8,26],
    [10,27],[9,27],[8,27]];
  [...body, ...wingDown].forEach(([px, py]) => x.fillRect(px * 3 + pteroW, py * 2, 3, 2));
});

// Cloud
const cloudSprite = createSprite(50, 18, (x) => {
  x.fillStyle = '#ddd';
  x.fillRect(10, 2, 30, 4);
  x.fillRect(6, 6, 38, 4);
  x.fillRect(2, 10, 46, 4);
  x.fillRect(6, 14, 38, 3);
});

// ─── Game State ────────────────────────────────────────────
let state = 'idle'; // idle | running | dead
let score = 0;
let hiScore = parseInt(localStorage.getItem('dino-hi') || '0');
let speed = 6;
let frame = 0;
let groundX = 0;
let nightMode = false;

// Dino
const dino = { x: 44, y: 0, vy: 0, w: 44, h: 48, ducking: false, frame: 0 };
const GRAVITY = 0.6;
const JUMP_VEL = -12;
const GROUND_Y = H - 24;

// Obstacles
let obstacles = [];
let nextSpawn = 80;

// Clouds
let clouds = [];
for (let i = 0; i < 4; i++) clouds.push({ x: 200 + i * 200, y: 20 + Math.random() * 40 });

// ─── Input ─────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
  keys[e.code] = true;
  if (state === 'idle' || state === 'dead') startGame();
});
document.addEventListener('keyup', e => keys[e.code] = false);

canvas.addEventListener('touchstart', e => { e.preventDefault(); if (state === 'idle' || state === 'dead') startGame(); else jump(); });
document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); if (state === 'idle' || state === 'dead') startGame(); else jump(); });
document.getElementById('btn-jump').addEventListener('mousedown', e => { if (state === 'idle' || state === 'dead') startGame(); else jump(); });
document.getElementById('btn-duck').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowDown'] = true; });
document.getElementById('btn-duck').addEventListener('touchend', e => { keys['ArrowDown'] = false; });
document.getElementById('btn-duck').addEventListener('mousedown', () => keys['ArrowDown'] = true);
document.getElementById('btn-duck').addEventListener('mouseup', () => keys['ArrowDown'] = false);

function jump() {
  if (dino.y >= GROUND_Y - dino.h) {
    dino.vy = JUMP_VEL;
  }
}

// ─── Game Logic ────────────────────────────────────────────
function startGame() {
  if (state === 'running') return;
  state = 'running';
  score = 0;
  speed = 6;
  obstacles = [];
  nextSpawn = 80;
  dino.y = GROUND_Y - dino.h;
  dino.vy = 0;
  dino.ducking = false;
  nightMode = false;
  document.getElementById('msg').style.display = 'none';
  jump();
}

function die() {
  state = 'dead';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('dino-hi', hiScore);
  }
  document.getElementById('msg').innerHTML =
    '<div class="title">GAME OVER</div><div class="sub">Press SPACE or tap to restart</div>';
  document.getElementById('msg').style.display = 'block';
}

function spawnObstacle() {
  const r = Math.random();
  if (r < 0.55) {
    // Cactus
    const type = Math.floor(Math.random() * 3);
    const spr = cacti[type];
    obstacles.push({ type: 'cactus', x: W + 20, y: GROUND_Y - spr.height, w: spr.width, h: spr.height, sprite: spr });
  } else {
    // Ptero
    const heights = [GROUND_Y - 70, GROUND_Y - 46, GROUND_Y - 26];
    const py = heights[Math.floor(Math.random() * heights.length)];
    obstacles.push({ type: 'ptero', x: W + 20, y: py, w: 40, h: 30, frame: 0 });
  }
}

function update() {
  if (state !== 'running') return;
  frame++;

  // Speed up
  speed = 6 + score / 200;
  if (speed > 16) speed = 16;

  // Night mode toggle
  nightMode = (Math.floor(score / 700) % 2 === 1);

  // Dino physics
  const wantDuck = keys['ArrowDown'];
  if (wantDuck && dino.y >= GROUND_Y - dino.h) {
    dino.ducking = true;
    dino.h = 30;
    dino.w = 60;
  } else {
    dino.ducking = false;
    dino.h = 48;
    dino.w = 44;
  }

  if (keys['Space'] || keys['ArrowUp']) jump();

  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND_Y - dino.h) {
    dino.y = GROUND_Y - dino.h;
    dino.vy = 0;
  }

  // Fast fall when ducking in air
  if (wantDuck && dino.y < GROUND_Y - dino.h) dino.vy += 0.8;

  // Dino animation
  if (frame % 6 === 0) dino.frame = 1 - dino.frame;

  // Ground scroll
  groundX = (groundX + speed) % 24;

  // Clouds
  clouds.forEach(c => {
    c.x -= speed * 0.3;
    if (c.x < -60) { c.x = W + 20 + Math.random() * 100; c.y = 20 + Math.random() * 40; }
  });

  // Obstacles
  nextSpawn--;
  if (nextSpawn <= 0) {
    spawnObstacle();
    nextSpawn = 50 + Math.random() * 60 - speed * 2;
    if (nextSpawn < 30) nextSpawn = 30;
  }

  obstacles.forEach(o => {
    o.x -= speed;
    if (o.type === 'ptero' && frame % 10 === 0) o.frame = 1 - (o.frame || 0);
  });
  obstacles = obstacles.filter(o => o.x > -80);

  // Collision
  const pad = 6;
  const dx = dino.x + pad, dy = dino.y + pad, dw = dino.w - pad * 2, dh = dino.h - pad * 2;
  for (const o of obstacles) {
    const ox = o.x + pad, oy = o.y + pad, ow = o.w - pad * 2, oh = o.h - pad * 2;
    if (dx < ox + ow && dx + dw > ox && dy < oy + oh && dy + dh > oy) {
      die();
      return;
    }
  }

  // Score
  score += 0.15;
}

// ─── Rendering ─────────────────────────────────────────────
function draw() {
  const bg = nightMode ? '#1a1a2e' : '#f7f7f7';
  const fg = nightMode ? '#c4c4c4' : '#535353';

  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  if (!nightMode) {
    clouds.forEach(c => ctx.drawImage(cloudSprite, c.x, c.y));
  } else {
    // Stars
    ctx.fillStyle = '#c4c4c4';
    [[120,20],[300,35],[500,15],[650,45],[180,60],[420,30],[720,55]].forEach(([sx,sy]) => {
      ctx.fillRect(sx, sy, 2, 2);
      ctx.fillRect(sx+2, sy-2, 2, 2);
      ctx.fillRect(sx-2, sy-2, 2, 2);
      ctx.fillRect(sx, sy-4, 2, 2);
    });
    // Moon
    ctx.beginPath();
    ctx.arc(680, 40, 16, 0, Math.PI * 2);
    ctx.fillStyle = '#c4c4c4';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(688, 36, 12, 0, Math.PI * 2);
    ctx.fillStyle = bg;
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = fg;
  ctx.fillRect(0, GROUND_Y, W, 1);
  for (let gx = -groundX; gx < W; gx += 24) {
    ctx.fillRect(gx, GROUND_Y + 4, 12, 1);
    ctx.fillRect(gx + 6, GROUND_Y + 8, 8, 1);
  }

  // Dino
  if (nightMode) ctx.filter = 'invert(1)';
  if (state === 'dead') {
    // Dead pose - just standing frame
    if (dino.ducking) {
      ctx.drawImage(dinoDuck, 0, 0, duckW, duckH, dino.x, dino.y, duckW, duckH);
    } else {
      ctx.drawImage(dinoSprite, 0, 0, dinoW, dinoH, dino.x, dino.y, dinoW, dinoH);
    }
  } else if (dino.y < GROUND_Y - dino.h) {
    // Jumping - static frame
    if (dino.ducking) {
      ctx.drawImage(dinoDuck, 0, 0, duckW, duckH, dino.x, dino.y, duckW, duckH);
    } else {
      ctx.drawImage(dinoSprite, 0, 0, dinoW, dinoH, dino.x, dino.y, dinoW, dinoH);
    }
  } else {
    // Running animation
    if (dino.ducking) {
      ctx.drawImage(dinoDuck, dino.frame * duckW, 0, duckW, duckH, dino.x, dino.y, duckW, duckH);
    } else {
      ctx.drawImage(dinoSprite, dino.frame * dinoW, 0, dinoW, dinoH, dino.x, dino.y, dinoW, dinoH);
    }
  }
  if (nightMode) ctx.filter = 'none';

  // Obstacles
  if (nightMode) ctx.filter = 'invert(1)';
  obstacles.forEach(o => {
    if (o.type === 'cactus') {
      ctx.drawImage(o.sprite, o.x, o.y);
    } else {
      const f = o.frame || 0;
      ctx.drawImage(pteroSprite, f * pteroW, 0, pteroW, pteroH, o.x, o.y, pteroW, pteroH);
    }
  });
  if (nightMode) ctx.filter = 'none';

  // Score display
  const sc = Math.floor(score).toString().padStart(5, '0');
  const hi = hiScore.toString().padStart(5, '0');
  document.getElementById('cur-score').textContent = sc;
  document.getElementById('hi-score').textContent = hi;

  // 100-point flash
  if (Math.floor(score) > 0 && Math.floor(score) % 100 === 0 && frame % 20 < 10) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── Main Loop ─────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Init
dino.y = GROUND_Y - dino.h;
loop();
</script>

</body>
</html>
